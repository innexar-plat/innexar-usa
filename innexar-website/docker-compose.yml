name: innexar-usa

version: '3.8'

services:
  innexar-website:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: innexar-usa-website
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
      # WaaS USA
      - NEXT_PUBLIC_WORKSPACE_API_URL=${NEXT_PUBLIC_WORKSPACE_API_URL:-https://api3.innexar.app}
      - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL:-https://panel.innexar.app}
      # Resend Configuration (recomendado)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-comercial@innexar.app}
      # Email de destino
      - CONTACT_RECIPIENT_EMAIL=${CONTACT_RECIPIENT_EMAIL:-comercial@innexar.app}
      # Resposta automática
      - ENABLE_AUTO_REPLY=${ENABLE_AUTO_REPLY:-true}
      # SMTP Mailcow Configuration
      - SMTP_HOST=${SMTP_HOST:-mail.innexar.app}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-comercial@innexar.app}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-comercial@innexar.app}
    env_file:
      - .env
    networks:
      - fixelo_fixelo-network
    labels:
      - "traefik.enable=true"
      # USA: innexar.app (evita conflito com stack BR)
      - "traefik.http.routers.usa-website.rule=Host(`innexar.app`) || Host(`www.innexar.app`)"
      - "traefik.http.routers.usa-website.entrypoints=websecure"
      - "traefik.http.routers.usa-website.tls.certresolver=cloudflare"
      - "traefik.http.routers.usa-website.service=usa-website-service"
      - "traefik.http.routers.usa-website-www.rule=Host(`www.innexar.app`)"
      - "traefik.http.routers.usa-website-www.entrypoints=websecure"
      - "traefik.http.routers.usa-website-www.tls.certresolver=cloudflare"
      - "traefik.http.routers.usa-website-www.middlewares=usa-redirect-to-non-www"
      - "traefik.http.middlewares.usa-redirect-to-non-www.redirectregex.regex=^https://www\\.innexar\\.app/(.*)"
      - "traefik.http.middlewares.usa-redirect-to-non-www.redirectregex.replacement=https://innexar.app/$${1}"
      - "traefik.http.middlewares.usa-redirect-to-non-www.redirectregex.permanent=true"
      - "traefik.http.services.usa-website-service.loadbalancer.server.port=3000"
      - "traefik.http.services.usa-website-service.loadbalancer.passHostHeader=true"
      - "traefik.http.middlewares.usa-website-retry.retry.attempts=3"
      - "traefik.http.routers.usa-website.middlewares=usa-website-retry"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fixelo_fixelo-network:
    external: true
